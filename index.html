<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级时钟</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container" id="appContainer">
        <main class="main-display" id="mainDisplay">
            <div class="time-section" id="timeSection">
                <div class="current-time" id="currentTime">00:00:00</div>
                <div class="current-date" id="currentDate">0000年00月00日</div>
            </div>

            <div class="countdown-section" id="countdownSection">
                <div class="countdown-time" id="countdownTime">
                    <span id="countdownHours">00</span>:<span id="countdownMinutes">00</span>:<span id="countdownSeconds">00</span>
                </div>
                <div class="countdown-label" id="countdownLabel"></div>
                <div class="countdown-controls" id="countdownControls">
                    <button class="countdown-control-btn" id="pauseResumeBtn" title="暂停/开始">
                        <svg id="pauseIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="6" y="4" width="4" height="16"/>
                            <rect x="14" y="4" width="4" height="16"/>
                        </svg>
                        <svg id="playIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                    </button>
                    <button class="countdown-control-btn" id="resetCountdownBtn" title="重置">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                        </svg>
                    </button>
                    <button class="countdown-control-btn delete" id="deleteCountdownBtn" title="删除">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="gaokao-section" id="gaokaoSection">
                <div class="gaokao-title"></div>
                <div class="gaokao-countdown" id="gaokaoCountdown">
                    距离高考 <span id="gaokaoDays">000</span>天
                    <span id="gaokaoHours">00</span>时
                    <span id="gaokaoMinutes">00</span>分
                    <span id="gaokaoSeconds">00</span>秒
                </div>
            </div>
        </main>

        <div class="control-bar" id="controlBar">
            <button class="control-btn" id="personalizeBtn" title="个性化">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"/>
                    <rect x="14" y="3" width="7" height="7"/>
                    <rect x="3" y="14" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/>
                </svg>
            </button>
            <button class="control-btn" id="scheduleBtn" title="课表">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
            </button>
            <button class="control-btn" id="settingsBtn" title="设置">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
            <button class="control-btn" id="countdownBtn" title="倒计时">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
            </button>
            <button class="control-btn" id="fullscreenBtn" title="全屏">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="countdownModal">
            <div class="modal-header">
                <h3>添加倒计时</h3>
                <button class="modal-close" id="closeCountdownModal">×</button>
            </div>
            <div class="modal-body">
                <div class="timer-presets">
                    <button class="preset-btn" data-minutes="150">2小时30分</button>
                    <button class="preset-btn" data-minutes="120">2小时</button>
                    <button class="preset-btn" data-minutes="75">1小时15分</button>
                    <button class="preset-btn" data-minutes="40">40分钟</button>
                </div>
                <div class="custom-input">
                    <input type="number" id="customMinutes" placeholder="自定义分钟数" min="1" max="999">
                    <button class="modal-btn" id="startCustomTimer">开始</button>
                </div>
            </div>
        </div>

        <div class="modal" id="scheduleModal">
            <div class="modal-header">
                <h3>课表设置</h3>
                <button class="modal-close" id="closeScheduleModal">×</button>
            </div>
            <div class="modal-body">
                <div class="schedule-list" id="scheduleList"></div>
                <button class="modal-btn full-width" id="addScheduleBtn">+ 添加时段</button>
            </div>
        </div>

        <div class="modal" id="scheduleEditModal">
            <div class="modal-header">
                <h3>编辑时段</h3>
                <button class="modal-close" id="closeScheduleEditModal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>标签</label>
                    <input type="text" id="editScheduleLabel" placeholder="如：自修时间">
                </div>
                <div class="form-group">
                    <label>星期</label>
                    <div class="day-selector" id="editScheduleDays"></div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>开始时间</label>
                        <input type="time" id="editScheduleStart">
                    </div>
                    <div class="form-group">
                        <label>结束时间</label>
                        <input type="time" id="editScheduleEnd">
                    </div>
                </div>
                <button class="modal-btn full-width" id="saveScheduleBtn">保存</button>
            </div>
        </div>

        <div class="modal" id="settingsModal">
            <div class="modal-header">
                <h3>设置</h3>
                <button class="modal-close" id="closeSettingsModal">×</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label class="checkbox-label">
                        <input type="checkbox" id="showTimeWithCountdown">
                        倒计时时同时显示当前时间
                    </label>
                </div>
                <div class="setting-item">
                    <label>高考日期</label>
                    <input type="date" id="gaokaoDate" value="2026-06-07">
                </div>
                <button class="modal-btn full-width" id="saveSettingsBtn">保存设置</button>
            </div>
        </div>

        <div class="modal" id="newThemeModal">
            <div class="modal-header">
                <h3>新建主题</h3>
                <button class="modal-close" id="closeNewThemeModal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>主题名称</label>
                    <input type="text" id="newThemeName" placeholder="输入主题名称">
                </div>
                <button class="modal-btn full-width" id="saveNewThemeBtn">创建主题</button>
            </div>
        </div>
    </div>

    <div class="side-panel" id="personalizeSidePanel">
        <div class="side-panel-header">
            <h3>个性化</h3>
            <button class="modal-close" id="closePersonalizeSide">×</button>
        </div>
        <div class="side-panel-body">

            <!-- 主题选择 -->
            <section class="panel-section">
                <h4 class="panel-section-title">主题</h4>
                <div class="theme-grid">
                    <button class="theme-btn" data-theme="vscode">
                        <span class="theme-preview vscode"></span>
                        <span>VS Code</span>
                    </button>
                    <button class="theme-btn" data-theme="cyberpunk">
                        <span class="theme-preview cyberpunk"></span>
                        <span>赛博朋克</span>
                    </button>
                    <button class="theme-btn" data-theme="ink">
                        <span class="theme-preview ink"></span>
                        <span>水墨古风</span>
                    </button>
                    <button class="theme-btn" data-theme="mahiro">
                        <span class="theme-preview mahiro"></span>
                        <span>绪山真寻</span>
                    </button>
                </div>
                <div class="custom-themes-list" id="customThemesContainer"></div>
                <button class="modal-btn full-width" id="newThemeBtn">+ 新建主题</button>
                <button class="modal-btn secondary full-width" id="resetThemeBtn">恢复预设</button>
            </section>

            <!-- 布局设置 -->
            <section class="panel-section">
                <h4 class="panel-section-title">布局</h4>
                <div class="layout-presets">
                    <button class="layout-btn" data-layout="compact">紧凑</button>
                    <button class="layout-btn active" data-layout="default">默认</button>
                    <button class="layout-btn" data-layout="spaced">宽松</button>
                </div>
            </section>

            <!-- 元素微调 -->
            <section class="panel-section">
                <h4 class="panel-section-title">微调</h4>
                <div class="element-selector">
                    <select id="adjustElementSelect">
                        <option value="">选择元素...</option>
                        <option value="timeSection">当前时间</option>
                        <option value="countdownSection">倒计时</option>
                        <option value="gaokaoSection">高考倒计时</option>
                    </select>
                </div>
                <div class="adjust-controls" id="adjustControls">
                    <div class="adjust-row">
                        <button class="adjust-btn" data-dir="up">↑ 上移</button>
                        <button class="adjust-btn" data-dir="down">↓ 下移</button>
                    </div>
                    <button class="modal-btn secondary full-width" id="resetElementBtn">重置</button>
                </div>
            </section>

            <!-- 导入导出 -->
            <section class="panel-section">
                <h4 class="panel-section-title">主题管理</h4>
                <div class="btn-group">
                    <button class="modal-btn" id="importThemeFolderBtn">📁 导入</button>
                    <button class="modal-btn" id="downloadTemplateBtn">📥 模板</button>
                </div>
                <div class="btn-group">
                    <button class="modal-btn" id="importConfigBtn">⬇️ 导入配置</button>
                    <button class="modal-btn" id="exportConfigBtn">⬆️ 导出配置</button>
                </div>
            </section>

            <!-- 高级编辑 -->
            <section class="panel-section">
                <label class="toggle-label">
                    <input type="checkbox" id="advancedModeToggleSide">
                    <span>高级编辑模式</span>
                </label>
                <div class="advanced-panel" id="advancedPanelSide">
                    <select id="elementSelectorSide">
                        <option value="#currentTime">当前时间</option>
                        <option value="#currentDate">当前日期</option>
                        <option value="#countdownTime">倒计时</option>
                        <option value="#gaokaoSection">高考区域</option>
                    </select>
                    <textarea id="cssEditorSide" placeholder="color: #fff;&#10;font-size: 2em;"></textarea>
                    <button class="modal-btn" id="applyCssBtnSide">应用</button>
                </div>
            </section>
        </div>
    </div>

    <!-- 模块脚本 -->
    <script src="modules/core.js"></script>
    <script src="modules/theme.js"></script>
    <script src="modules/countdown.js"></script>
    <script src="modules/schedule.js"></script>
    <script src="modules/animation.js"></script>
    <script src="modules/grid.js"></script>
    <script src="modules/modal.js"></script>
    <script src="modules/personalize.js"></script>
    <script src="script.js"></script>
</body>
</html>
