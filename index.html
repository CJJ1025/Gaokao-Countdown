<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计时器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="special-timer-section" id="specialTimerSection" style="display: none;">
            <div class="special-countdown">
                <span id="specialMinutes">00</span>:<span id="specialSeconds">00</span>
            </div>
        </div>

        <div class="clock-section">
            <div class="current-time" id="currentTime">00:00:00</div>
            <div class="current-date" id="currentDate">0000年00月00日</div>
        </div>

        <div class="gaokao-section">
            <div class="gaokao-countdown" id="gaokaoCountdown">
                <span class="gaokao-label">距离高考</span>
                <span id="gaokaoDays">00</span>天
                <span id="gaokaoHours">00</span>时
                <span id="gaokaoMinutes">00</span>分
                <span id="gaokaoSeconds">00</span>秒
            </div>
        </div>

        <div class="custom-timers-section">
            <div class="custom-timers-list" id="customTimersList"></div>
        </div>
    </div>

    <button id="settingsBtn" class="control-btn" title="设置">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l-.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
        </svg>
    </button>

    <button id="timerControlBtn" class="control-btn" title="计时器">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
        </svg>
    </button>

    <button id="fullscreenBtn" class="control-btn" title="全屏">
        <svg id="fullscreenIcon" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
        <svg id="exitFullscreenIcon" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
        </svg>
    </button>

    <div id="settingsPopup" class="popup settings-popup">
        <div class="popup-title">主题设置</div>
        <div class="theme-options">
            <button class="theme-btn active" data-theme="default">默认</button>
            <button class="theme-btn" data-theme="dark">深色</button>
            <button class="theme-btn" data-theme="neon">霓虹</button>
            <button class="theme-btn" data-theme="ocean">海洋</button>
            <button class="theme-btn" data-theme="forest">森林</button>
        </div>
        <div class="custom-theme">
            <label>自定义颜色</label>
            <div class="color-pickers">
                <div class="color-picker">
                    <span>背景色</span>
                    <input type="color" id="bgColor" value="#1e1e1e">
                </div>
                <div class="color-picker">
                    <span>文字色</span>
                    <input type="color" id="textColor" value="#cccccc">
                </div>
                <div class="color-picker">
                    <span>强调色</span>
                    <input type="color" id="accentColor" value="#4fc1ff">
                </div>
            </div>
        </div>

        <div class="settings-divider"></div>
        <div class="popup-title">显示设置</div>
        
        <div class="setting-group">
            <label class="setting-label">
                <input type="checkbox" id="showCustomTimers" checked>
                <span>显示自定义倒计时</span>
            </label>
            <label class="setting-label">
                <input type="checkbox" id="showGaokao" checked>
                <span>显示高考倒计时</span>
            </label>
            <label class="setting-label">
                <input type="checkbox" id="showClock">
                <span>特殊时段显示当前时间</span>
            </label>
            <label class="setting-label">
                <input type="checkbox" id="showLongFormat" checked>
                <span>超过2小时显示hh:mm:ss</span>
            </label>
        </div>

        <div class="setting-group">
            <label class="setting-label">显示顺序</label>
            <div class="order-controls">
                <div class="order-item">
                    <span>自定义倒计时</span>
                    <select id="customTimersOrder" class="order-select">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>
                <div class="order-item">
                    <span>当前时间</span>
                    <select id="clockOrder" class="order-select">
                        <option value="1">1</option>
                        <option value="2" selected>2</option>
                        <option value="3">3</option>
                    </select>
                </div>
                <div class="order-item">
                    <span>高考倒计时</span>
                    <select id="gaokaoOrder" class="order-select">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3" selected>3</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="settings-divider"></div>
        <div class="popup-title">全屏设置</div>
        
        <div class="setting-group">
            <label class="setting-label">自定义倒计时字体大小</label>
            <input type="range" id="customTimersSize" min="3" max="10" value="4.5" step="0.5" class="size-slider">
            <span class="size-value">4.5em</span>
        </div>

        <div class="setting-group">
            <label class="setting-label">特殊倒计时字体大小</label>
            <input type="range" id="specialTimerSize" min="8" max="16" value="12" step="1" class="size-slider">
            <span class="size-value">12em</span>
        </div>

        <div class="setting-group">
            <label class="setting-label">当前时间字体大小</label>
            <input type="range" id="clockSize" min="3" max="10" value="5" step="0.5" class="size-slider">
            <span class="size-value">5em</span>
        </div>

        <button id="resetAllBtn" class="popup-btn secondary">重置所有设置</button>
    </div>

    <div id="timerPopup" class="popup timer-popup">
        <div class="popup-title">选择倒计时</div>
        <div class="popup-options">
            <button class="preset-btn" data-minutes="150">150分钟</button>
            <button class="preset-btn" data-minutes="120">120分钟</button>
            <button class="preset-btn" data-minutes="75">75分钟</button>
            <button class="preset-btn" data-minutes="45">45分钟</button>
            <button class="preset-btn" data-minutes="30">30分钟</button>
        </div>
        <div class="popup-custom">
            <input type="number" id="customMinutes" class="popup-input" placeholder="自定义" min="1" max="999">
            <button id="customTimerBtn" class="popup-btn">确定</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
